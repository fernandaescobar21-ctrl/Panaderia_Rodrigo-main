<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║           PLANTILLA BASE (LAYOUT) - base.html               ║
  ╠══════════════════════════════════════════════════════════════╣
  ║  Este archivo es la "carcasa" común de toda la aplicación.  ║
  ║  Define la estructura HTML que se REPITE en cada página:    ║
  ║    ✅ <head> con estilos y fuentes                          ║
  ║    ✅ Navbar                                                ║
  ║    ✅ Zona de mensajes flash                                ║
  ║    ✅ Footer                                                ║
  ║                                                             ║
  ║  El contenido específico de cada página va en el            ║
  ║  th:fragment="content" que las vistas hijas reemplazan.     ║
  ╚══════════════════════════════════════════════════════════════╝

  CONCEPTO CLAVE — DRY (Don't Repeat Yourself):
  Sin este layout, cada vista tendría que repetir el navbar,
  el footer y los links a CSS. Si mañana cambias el color del
  navbar, tendrías que editar 10 archivos. Con el layout,
  cambias UNO y se refleja en toda la app automáticamente.

  Thymeleaf ofrece dos estrategias para layouts:
  ① th:fragment + th:replace  → fragmentos reutilizables (este archivo)
  ② Thymeleaf Layout Dialect  → herencia de plantillas (más parecido a Django/Blade)
  Este proyecto usa la estrategia ①.
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🍞 Panadería Rodrigo</title>

    <link rel="stylesheet" th:href="@{/css/style.css}"/>

    <!--
      rel="preconnect" → Optimización de rendimiento web.
      Le dice al navegador: "voy a necesitar recursos de fonts.googleapis.com,
      establece la conexión TCP/TLS YA mientras cargas el resto".
      Reduce el tiempo de carga de las fuentes entre 100-500ms.
      Siempre debe ir ANTES del link que realmente carga la fuente.
      Sin preconnect: cargar HTML → descubrir el link → conectar → descargar fuente
      Con preconnect:  conectar (en paralelo) → descubrir el link → descargar fuente
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
          rel="stylesheet"/>
</head>

<body>

<!-- ============================================================
     NAVBAR COMPARTIDA
     Al estar en el layout, esta navbar aparece automáticamente
     en TODAS las páginas que usen esta plantilla.
     Lógica de seguridad centralizada: si cambia un rol o se
     agrega una nueva sección, se edita solo aquí.
     ============================================================ -->
<nav class="navbar">
    <div class="navbar-brand">
        <span class="brand-icon">🍞</span>
        <a th:href="@{/}" class="brand-name">Panadería Rodrigo</a>
    </div>

    <div class="navbar-menu">
        <a th:href="@{/productos}" class="nav-link">Productos</a>
        <a th:href="@{/clientes}" class="nav-link"
           sec:authorize="hasAnyRole('ADMIN','EMPLEADO')">Clientes</a>
        <a th:href="@{/pedidos}"  class="nav-link"
           sec:authorize="hasAnyRole('ADMIN','EMPLEADO')">Pedidos</a>
    </div>

    <div class="navbar-auth">
        <span sec:authorize="isAuthenticated()" class="user-info">
            👤 <span sec:authentication="name"></span>
            <span sec:authorize="hasRole('ADMIN')"    class="badge badge-admin">ADMIN</span>
            <span sec:authorize="hasRole('EMPLEADO')" class="badge badge-empleado">EMPLEADO</span>
        </span>
        <form th:action="@{/logout}" method="post"
              sec:authorize="isAuthenticated()" style="display:inline">
            <button type="submit" class="btn-logout">Salir</button>
        </form>
        <a th:href="@{/login}" sec:authorize="isAnonymous()" class="btn-login">Ingresar</a>
    </div>
</nav>


<!-- ============================================================
     ZONA DE MENSAJES FLASH GLOBALES
     Al estar en el layout, los mensajes de éxito/error
     funcionan en TODAS las páginas sin repetir código.

     NOVEDAD respecto a vistas anteriores: aquí hay DOS tipos
     de mensaje, no solo uno:
       - ${mensaje} → alerta verde (éxito): "Producto guardado ✅"
       - ${error}   → alerta roja (error):  "No se pudo eliminar ❌"

     El controlador decide cuál enviar:
       flash.addFlashAttribute("mensaje", "Creado correctamente"); // éxito
       flash.addFlashAttribute("error",   "No puedes borrarlo");   // error

     Ambos son mutuamente independientes: podrían aparecer juntos
     (aunque en la práctica solo se usa uno a la vez).
     ============================================================ -->
<main class="main-content">

    <div th:if="${mensaje}" class="alert alert-success">
        <!--
          Aquí se separa el span del div, a diferencia de vistas anteriores
          donde se usaba th:text directamente en el div contenedor.
          Ambas formas son equivalentes en resultado:

          Forma A (vistas anteriores):
            <div th:text="${mensaje}" class="alert alert-success"></div>

          Forma B (este layout):
            <div class="alert alert-success">
              <span th:text="${mensaje}"></span>
            </div>

          Forma B es más flexible: permite agregar íconos u otros
          elementos HTML dentro del alert además del texto.
          Ej: <div class="alert">✅ <span th:text="${mensaje}"></span></div>
        -->
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <span th:text="${error}"></span>
    </div>


    <!-- ── ZONA DE CONTENIDO INTERCAMBIABLE ─────────────────────
         th:fragment="content" define un FRAGMENTO con nombre.

         ¿Qué es un fragmento?
         Es un bloque HTML identificado por nombre que puede ser
         referenciado e insertado desde otras plantillas.

         Este fragmento vacío actúa como "ranura" (slot):
         cada vista hija lo reemplaza con su contenido propio.

         ¿Cómo lo usa una vista hija?
         En la vista hija se haría algo como:
           <div th:replace="~{base :: content}">
             ...contenido específico de esa página...
           </div>

         O usando Thymeleaf Layout Dialect:
           <html layout:decorate="~{base}">
             <div layout:fragment="content">
               ...contenido de la página...
             </div>
           </html>

         IMPORTANTE: tal como está escrito en este archivo,
         el fragmento está DEFINIDO pero vacío.
         Las vistas hijas son las que lo "llenan" al incluirlo.
         El comentario "Sobreescribir en cada vista" es exactamente
         eso: una instrucción para el desarrollador que use este layout.
    ─────────────────────────────────────────────────────────── -->
    <div th:fragment="content">
        <!-- Sobreescribir en cada vista -->
    </div>

</main>


<!-- ============================================================
     FOOTER COMPARTIDO
     Igual que el navbar: definido una sola vez, aparece en todas
     las páginas. Si necesitas cambiar el año o agregar links
     legales, lo haces aquí y listo.
     ============================================================ -->
<footer class="footer">
    <p>🍞 Panadería Rodrigo &mdash; Hecho con Spring Boot &copy; Marzo 2026 &mdash; Docente Sabina Romero</p>
</footer>

</body>
</html>
